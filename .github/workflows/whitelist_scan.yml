name: whitelist_scan

# Batch 2.2 (#7) — 白名單平台健康 cron
# 每 30 分鐘抓所有 CLAUDE.md 候選平台首頁 + listing endpoint，
# 結果寫 data/opportunities/<platform>/<UTC>.json
# 探索動作改成「讀本地 JSONL」而非每輪重訪
#
# 部署: cp 到 relayhop/ClaudeEarnSelf-runtime/.github/workflows/whitelist_scan.yml

on:
  schedule:
    - cron: '12,42 * * * *'
  workflow_dispatch: {}

concurrency:
  group: whitelist-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Probe platform endpoints
        run: |
          set +e
          mkdir -p data/opportunities
          TS=$(date -u +%Y%m%dT%H%M)
          DAY=$(date -u +%Y-%m-%d)

          # SN bounty (type=bounties, week scope to catch payable items)
          curl -sS -m 15 'https://stacker.news/api/graphql' \
            -H 'content-type: application/json' \
            -d '{"query":"{ items(sort:\"top\", when:\"week\", type:\"bounties\", limit:30) { items { id title bounty bountyPaidTo ncomments createdAt user { name } } } }"}' \
            > data/opportunities/sn_bounty_${TS}.json

          # SN bounty (recent, day scope) — for fresh unpaid bounties
          curl -sS -m 15 'https://stacker.news/api/graphql' \
            -H 'content-type: application/json' \
            -d '{"query":"{ items(sort:\"recent\", when:\"day\", type:\"bounties\", limit:30) { items { id title bounty bountyPaidTo ncomments createdAt user { name } } } }"}' \
            > data/opportunities/sn_bounty_recent_${TS}.json

          # NOTE: bountycaster/algora/polar/layer3 endpoints all returned 404/SPA
          # as of 2026-05-01 audit; removed from cron (logged in null_results.tsv).
          # If their APIs come back, add curls here.

          # 整理: 只保留每天最新一份 (避免 repo 膨脹)
          find data/opportunities -name "*.json" -mtime +2 -delete || true

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/opportunities/ || true
          git diff --cached --quiet || git commit -m "whitelist_scan: $(date -u +%FT%TZ)"
          git push || true
