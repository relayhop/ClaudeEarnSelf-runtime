<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Bitcoin · Lightning 雙語術語表 (zh-en)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

function render(rows){
  const tb=document.querySelector('#t tbody'); tb.innerHTML='';
  rows.forEach(r=>{tb.innerHTML+='<tr><td><code>'+r[0]+'</code></td><td>'+r[1]+'</td><td>'+r[2]+'</td></tr>'});
}
function filter(){const q=document.getElementById('q').value.toLowerCase().trim();render(q?T.filter(r=>r.join('').toLowerCase().includes(q)):T);}

</script></body></html>
